services:
  - type: web
    name: convo-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: APP_ENV
        value: development
      - key: APP_SECRET_KEY
        generateValue: true
      - key: BACKEND_BASE_URL
        value: https://convo-backend.onrender.com
      - key: FRONTEND_BASE_URL
        value: https://convo-ipa.vercel.app
      - key: ALLOWED_HOSTS
        value: convo-backend.onrender.com
      - key: USE_MOCK_GRAPH
        value: "true"
      - key: USE_MOCK_STT
        value: "true"
      - key: USE_MOCK_TTS
        value: "true"
      - key: USE_LLM_INTENT
        value: "false"
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./data/ipa.db
      - key: MANAGER_EMAILS
        value: manager@contoso.com,lead@contoso.com
      - key: ADMIN_EMAILS
        value: admin@contoso.com
